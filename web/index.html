<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Infrix Playground</title>
  <meta name="description" content="Run a governed flow, watch it in Cinema, export a proof, and verify it in your browser — no install, no wallet, no funding." />
  <!-- Shared Nexus design tokens (served from the embedded Nexus asset tree). -->
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/playground.css" />
</head>
<body>
  <header class="pg-header">
    <a class="pg-brand" href="#/" aria-label="Infrix Playground home">
      <span class="pg-brand-mark" aria-hidden="true">
        <svg viewBox="0 0 80 10" role="img">
          <circle cx="5" cy="5" r="4" /><circle cx="17" cy="5" r="4" /><circle cx="29" cy="5" r="4" /><circle cx="41" cy="5" r="4" /><circle cx="53" cy="5" r="4" /><circle cx="65" cy="5" r="4" /><circle cx="77" cy="5" r="4" />
        </svg>
      </span>
      <span class="pg-brand-name">Infrix Playground</span>
    </a>
    <nav class="pg-nav" aria-label="Primary">
      <a href="#/" data-nav="home">Home</a>
      <a href="#/verify" data-nav="verify">Verify a proof</a>
      <a href="#/lab" data-nav="lab">Tamper Lab</a>
      <a href="#/status" data-nav="status">What it can do</a>
    </nav>
    <button id="pg-theme" class="pg-theme-btn" type="button" aria-label="Switch theme" title="Switch theme">☾</button>
    <span class="pg-mode-badge" id="pg-mode-badge" hidden></span>
  </header>

  <main id="app" class="pg-main" aria-live="polite">
    <!-- Views render here. -->
  </main>

  <footer class="pg-footer">
    <span>Runs on the live Accumulate <strong>Kermit testnet</strong> — real anchors, no install, no wallet, no real funds.</span>
    <span class="pg-footer-links">
      <a href="https://github.com/opendlt/infrix-cli" target="_blank" rel="noopener">Install the CLI</a> ·
      <a href="https://github.com/opendlt/infrix-sdk-js" target="_blank" rel="noopener">Build with the SDK</a> ·
      <a href="https://github.com/opendlt" target="_blank" rel="noopener">GitHub</a>
    </span>
  </footer>

  <script type="module" src="/playground.js"></script>
</body>
</html>
